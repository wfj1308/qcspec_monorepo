version: '3.9'

services:

  # ── FastAPI 后端 ──
  api:
    build:
      context: ../../services/api
      dockerfile: ../../infra/docker/Dockerfile.api
    container_name: qcspec-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - REPORT_OUTPUT_DIR=/app/reports
      - TEMPLATE_DIR=/app/templates
      - DEBUG=${DEBUG:-false}
      - V_ROOT_URI=${V_ROOT_URI:-v://cn.中北/}
      - GITPEG_REGISTRAR_BASE_URL=${GITPEG_REGISTRAR_BASE_URL:-https://gitpeg.cn}
      - GITPEG_PARTNER_CODE=${GITPEG_PARTNER_CODE}
      - GITPEG_INDUSTRY_CODE=${GITPEG_INDUSTRY_CODE}
      - GITPEG_CLIENT_ID=${GITPEG_CLIENT_ID}
      - GITPEG_CLIENT_SECRET=${GITPEG_CLIENT_SECRET}
      - GITPEG_REGISTRATION_MODE=${GITPEG_REGISTRATION_MODE:-DOMAIN}
      - GITPEG_RETURN_URL=${GITPEG_RETURN_URL}
      - GITPEG_WEBHOOK_URL=${GITPEG_WEBHOOK_URL}
      - GITPEG_WEBHOOK_SECRET=${GITPEG_WEBHOOK_SECRET}
      - GITPEG_MODULE_CANDIDATES=${GITPEG_MODULE_CANDIDATES:-proof,utrip,openapi}
    volumes:
      - report_data:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - qcspec

  # ── Nginx 静态文件服务 ──
  web:
    image: nginx:alpine
    container_name: qcspec-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../apps/web:/usr/share/nginx/html/admin:ro
      - ../../apps/mobile:/usr/share/nginx/html/mobile:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - qcspec

volumes:
  report_data:

networks:
  qcspec:
    driver: bridge
